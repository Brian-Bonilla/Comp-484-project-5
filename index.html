<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSUN Campus Map Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the CSUN Campus Map Game!</h1>
    <div id="score">Score: 0</div>
    <div id="timer">Time: 0s</div>
    <div id="highScore">Best Time: --</div>
    <div id="prompt">Find the location:</div>
    <div id="feedback"></div>
    <button id="startGame">Start Game</button>
    
    <div id="gameContainer">
        <div id="gameLog"></div>
        <div id="map"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=&libraries=geometry"></script>
    <script src="script.js"></script>
</body>
</html>
